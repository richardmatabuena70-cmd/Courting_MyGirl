<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="container">
        
        <div id="question-screen">
            <div class="heart-main">❤️</div>
            <h1>Will you go on a data with me?</h1>
            <div class="button-container">
                <button class="btn btn-yes">Yes</button>
                <div class="no-button-wrapper">
                    <button class="btn btn-no" id="no-btn">No</button>
                    <div class="bubble-container" id="bubble-container"></div>
                </div>
            </div>
        </div>

        <div class="yes-screen" id="yes-screen">
            <div class="celebration">💕</div>
            <h2 class="yes-title">YES!</h2>
            <p class="yes-subtitle">We have a date now 💖</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
